<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Buat Password Baru')}"></head>

<body class="bg-[#FDF3F0] font-['Plus Jakarta Sans'] min-h-screen flex items-center justify-center p-4">
  <!-- Section: Main Container -->
  <div class="w-full max-w-md">
    <!-- Section: Card -->
    <div class="bg-white rounded-2xl shadow-md p-8">
      <!-- Section: Icon -->
      <div class="flex justify-center mb-6">
        <i data-tabler="lock" class="w-12 h-12 text-[#D53E0F]"></i>
      </div>

      <!-- Section: Heading & Subtext -->
      <h1 class="text-2xl font-bold text-stone-900 text-center mb-2">Buat Password Baru</h1>
      <p class="text-stone-500 text-center text-sm mb-6">
        Anda login menggunakan password sementara. Buat password baru untuk melanjutkan.
      </p>

      <!-- Section: Warning Alert -->
      <div th:if="${warningMessage}" class="bg-yellow-50 border border-yellow-200 text-yellow-700 rounded-xl px-4 py-3 text-sm mb-4">
        <span th:text="${warningMessage}"></span>
      </div>

      <!-- Section: Error Alert -->
      <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-4">
        <span th:text="${error}"></span>
      </div>

      <!-- Section: Form -->
      <form th:action="@{/auth/change-password}" th:object="${changePasswordForm}" method="post" class="space-y-4">
        <!-- Thymeleaf: CSRF token for POST security -->
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Section: Password Baru Field -->
        <div>
          <label for="newPassword" class="block text-sm font-semibold text-stone-900 mb-2">
            Password Baru
          </label>
          <div class="relative">
            <input
              type="password"
              id="newPassword"
              th:field="*{newPassword}"
              placeholder="Minimal 8 karakter"
              class="w-full px-4 py-3 border border-stone-200 rounded-xl text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent"
              autocomplete="new-password"
            />
            <button
              type="button"
              onclick="togglePasswordVisibility('newPassword', 'newPasswordToggle')"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-stone-500 hover:text-stone-700"
            >
              <i data-tabler="eye" id="newPasswordToggle" class="w-5 h-5"></i>
            </button>
          </div>
          <!-- Thymeleaf: Display field validation errors -->
          <div th:if="${#fields.hasErrors('newPassword')}" class="text-red-600 text-xs mt-1">
            <p th:each="error : ${#fields.errors('newPassword')}" th:text="${error}"></p>
          </div>

          <!-- Section: Password Strength Indicator -->
          <div class="mt-3">
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs text-stone-500">Kekuatan password:</span>
              <span id="strengthText" class="text-xs font-semibold text-stone-500">-</span>
            </div>
            <div class="w-full bg-stone-200 rounded-full h-2 overflow-hidden">
              <div
                id="strengthBar"
                class="h-full w-0 transition-all duration-300"
                style="background-color: transparent;"
              ></div>
            </div>
            <div class="mt-2 text-xs text-stone-600 space-y-1">
              <p><span id="criteria-length" class="inline-block w-4">○</span> Minimal 8 karakter</p>
              <p><span id="criteria-uppercase" class="inline-block w-4">○</span> Mengandung huruf besar (A-Z)</p>
              <p><span id="criteria-number" class="inline-block w-4">○</span> Mengandung angka (0-9)</p>
              <p><span id="criteria-symbol" class="inline-block w-4">○</span> Mengandung simbol (!@#$%^&*)</p>
            </div>
          </div>
        </div>

        <!-- Section: Konfirmasi Password Field -->
        <div class="pt-2">
          <label for="confirmPassword" class="block text-sm font-semibold text-stone-900 mb-2">
            Konfirmasi Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="confirmPassword"
              th:field="*{confirmPassword}"
              placeholder="Ulangi password baru"
              class="w-full px-4 py-3 border border-stone-200 rounded-xl text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent"
              autocomplete="new-password"
            />
            <button
              type="button"
              onclick="togglePasswordVisibility('confirmPassword', 'confirmPasswordToggle')"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-stone-500 hover:text-stone-700"
            >
              <i data-tabler="eye" id="confirmPasswordToggle" class="w-5 h-5"></i>
            </button>
          </div>
          <!-- Thymeleaf: Display field validation errors -->
          <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-red-600 text-xs mt-1">
            <p th:each="error : ${#fields.errors('confirmPassword')}" th:text="${error}"></p>
          </div>
        </div>

        <!-- Section: Submit Button -->
        <button
          type="submit"
          class="w-full bg-[#D53E0F] hover:bg-[#5E0006] text-white font-semibold py-3 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2 mt-6"
        >
          <span>Simpan Password Baru</span>
          <i data-tabler="arrow-right" class="w-5 h-5"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- Tabler Icons CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.js"></script>

  <!-- Section: Vanilla JS Scripts -->
  <script>
    /**
     * Toggle password field visibility between text and password types
     */
    function togglePasswordVisibility(fieldId, toggleIconId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(toggleIconId);

      if (field.type === 'password') {
        field.type = 'text';
        icon.setAttribute('data-tabler', 'eye-off');
      } else {
        field.type = 'password';
        icon.setAttribute('data-tabler', 'eye');
      }

      if (window.tabler) {
        window.tabler.createIcons();
      } 
    }

    /**
     * Check password strength and update indicator
     */
    function checkPasswordStrength() {
      const password = document.getElementById('newPassword').value;
      const strengthBar = document.getElementById('strengthBar');
      const strengthText = document.getElementById('strengthText');

      const hasMinLength = password.length >= 8;
      const hasUppercase = /[A-Z]/.test(password);
      const hasNumber = /[0-9]/.test(password);
      const hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);

      // Update criteria checkmarks
      updateCriteria('criteria-length', hasMinLength);
      updateCriteria('criteria-uppercase', hasUppercase);
      updateCriteria('criteria-number', hasNumber);
      updateCriteria('criteria-symbol', hasSymbol);

      // Calculate strength
      const criteriasMet = [hasMinLength, hasUppercase, hasNumber, hasSymbol].filter(Boolean).length;

      let strength = 'Lemah';
      let color = 'bg-red-400';

      if (criteriasMet === 0 || password.length === 0) {
        strength = '-';
        color = 'bg-stone-200';
      } else if (criteriasMet === 1 || criteriasMet === 2) {
        strength = 'Lemah';
        color = 'bg-red-400';
      } else if (criteriasMet === 3) {
        strength = 'Sedang';
        color = 'bg-yellow-400';
      } else if (criteriasMet === 4) {
        strength = 'Kuat';
        color = 'bg-green-500';
      }

      strengthBar.className = `h-full w-${password.length > 0 ? (criteriasMet / 4 * 100) : 0} transition-all duration-300 ${color}`;
      strengthBar.style.width = password.length > 0 ? (criteriasMet / 4 * 100) + '%' : '0%';
      strengthText.textContent = strength;
      strengthText.className = 'text-xs font-semibold ' + (strength === '-' ? 'text-stone-500' : strength === 'Lemah' ? 'text-red-600' : strength === 'Sedang' ? 'text-yellow-600' : 'text-green-600');
    }

    /**
     * Update criteria checkmark display
     */
    function updateCriteria(criteriaId, isMet) {
      const element = document.getElementById(criteriaId);
      if (isMet) {
        element.textContent = '✓';
        element.className = 'inline-block w-4 text-green-600 font-bold';
      } else {
        element.textContent = '○';
        element.className = 'inline-block w-4 text-stone-400';
      }
    }

    // Attach event listener to password field
    document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      checkPasswordStrength();
    });
  </script>
</body>
</html>
