<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konsultasi Baru - KlinikKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-stone-50 text-stone-900">
    <!-- Navbar -->
    <div th:replace="~{fragments/customer-navbar :: customerNavbar('consultations')}"></div>

    <!-- Main Content -->
    <div class="pt-20">
      <div class="p-8">
          <!-- Page Header -->
          <div class="mb-8">
            <a
              th:href="@{/customer/consultations}"
              class="text-orange-600 hover:text-orange-700 font-semibold mb-4 inline-block"
            >
              ← Kembali ke Konsultasi
            </a>
            <h1 class="text-4xl font-bold text-stone-900 mb-2">
              Mulai Konsultasi Baru
            </h1>
            <p class="text-stone-600">Pilih dokter dan jelaskan keluhan Anda</p>
          </div>

          <!-- Alert Messages -->
          <div
            th:if="${error}"
            th:replace="~{fragments/alerts :: error(${error})}"
          ></div>
          <div
            th:replace="~{fragments/alerts :: form-errors(${consultationForm})}"
          ></div>

          <!-- Step 1: Select Doctor -->
          <div class="mb-8">
            <h2 class="text-2xl font-bold text-stone-900 mb-6">Pilih Dokter</h2>
            <form
              th:action="@{/customer/consultations/new}"
              method="post"
              th:object="${consultationForm}"
            >
              <input
                th:if="${_csrf != null}"
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />

              <!-- Doctors Grid -->
              <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div
                  th:each="doctor : ${availableDoctors}"
                  class="relative cursor-pointer"
                >
                  <label class="block">
                    <input
                      type="radio"
                      th:field="*{doctorId}"
                      th:value="${doctor.userId}"
                      class="sr-only peer"
                      required
                    />
                    <div
                      class="bg-white rounded-2xl border-2 border-stone-200 p-6 hover:border-orange-500 transition peer-checked:border-orange-500 peer-checked:bg-orange-50"
                    >
                      <!-- Doctor Avatar -->
                      <div
                        class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4"
                      >
                        <span class="font-bold text-orange-600 text-2xl"
                          >DR</span
                        >
                      </div>

                      <!-- Doctor Info -->
                      <h3
                        class="text-lg font-bold text-stone-900 text-center mb-1"
                        th:text="${doctor.name}"
                      >
                        Dr. Ahmad
                      </h3>
                      <p
                        class="text-center text-orange-600 font-semibold text-sm mb-3"
                        th:text="${doctor.specialization}"
                      >
                        Dokter Umum
                      </p>

                      <!-- Availability Badge -->
                      <div class="flex justify-center mb-4">
                        <span
                          class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold"
                        >
                          Tersedia
                        </span>
                      </div>

                      <p class="text-xs text-stone-600 text-center mb-2">
                        <span
                          class="block font-semibold text-stone-700"
                          th:text="${doctor.specialization}"
                          >Spesialisasi</span
                        >
                      </p>
                    </div>
                  </label>
                </div>
              </div>

              <!-- Complaint Section -->
              <div
                class="bg-white rounded-2xl border border-stone-200 p-6 shadow-sm"
              >
                <h2 class="text-2xl font-bold text-stone-900 mb-6">
                  Jelaskan Keluhan Anda
                </h2>

                <div>
                  <label class="block text-sm font-semibold text-stone-900 mb-3"
                    >Keluhan / Gejala</label
                  >
                  <textarea
                    th:field="*{complaint}"
                    required
                    minlength="20"
                    class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                    rows="6"
                    placeholder="Jelaskan keluhan atau gejala yang Anda rasakan dengan detail. Minimal 20 karakter..."
                  ></textarea>
                  <span
                    th:errors="*{complaint}"
                    class="text-red-600 text-sm mt-2 block"
                  ></span>
                  <p class="text-xs text-stone-500 mt-2">
                    <span id="char-count">0</span> karakter (minimal 20)
                  </p>
                </div>

                <!-- Additional Info (Optional) -->
                <div class="mt-6">
                  <label class="block text-sm font-semibold text-stone-900 mb-3"
                    >Informasi Tambahan (Opsional)</label
                  >
                  <textarea
                    th:field="*{additionalInfo}"
                    class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500"
                    rows="3"
                    placeholder="Riwayat penyakit, alergi, atau informasi medis lainnya..."
                  ></textarea>
                </div>

                <!-- Submit Button -->
                <div class="flex gap-4 mt-8">
                  <a
                    th:href="@{/customer/consultations}"
                    class="flex-1 px-6 py-3 border border-orange-500 text-orange-600 rounded-lg hover:bg-orange-50 transition font-semibold text-center"
                  >
                    Batal
                  </a>
                  <button
                    type="submit"
                    class="flex-1 px-6 py-3 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition font-semibold"
                  >
                    Mulai Konsultasi
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      const complaintField = document.querySelector(
        'textarea[name="complaint"]',
      );
      const charCount = document.getElementById("char-count");

      if (complaintField) {
        charCount.textContent = complaintField.value.length;
        complaintField.addEventListener("input", function () {
          charCount.textContent = this.value.length;
        });
      }
    </script>
  </body>
</html>
