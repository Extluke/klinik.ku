<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Success Alert -->
    <div th:fragment="success(message)" 
         class="bg-green-50 border border-green-200 text-green-700 px-4 py-4 rounded-lg flex items-start gap-3 mb-4">
        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
        </svg>
        <div>
            <p class="font-semibold" th:text="${message}">Operasi berhasil!</p>
        </div>
    </div>

    <!-- Error Alert -->
    <div th:fragment="error(message)" 
         class="bg-red-50 border border-red-200 text-red-700 px-4 py-4 rounded-lg flex items-start gap-3 mb-4">
        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
        </svg>
        <div>
            <p class="font-semibold" th:text="${message}">Terjadi kesalahan!</p>
        </div>
    </div>

    <!-- Warning Alert -->
    <div th:fragment="warning(message)" 
         class="bg-yellow-50 border border-yellow-200 text-yellow-700 px-4 py-4 rounded-lg flex items-start gap-3 mb-4">
        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"/>
        </svg>
        <div>
            <p class="font-semibold" th:text="${message}">Perhatian!</p>
        </div>
    </div>

    <!-- Info Alert -->
    <div th:fragment="info(message)" 
         class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-4 rounded-lg flex items-start gap-3 mb-4">
        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"/>
        </svg>
        <div>
            <p class="font-semibold" th:text="${message}">Informasi</p>
        </div>
    </div>

    <!-- Form Errors Display -->
    <div th:fragment="form-errors(bindingResult)" th:if="${bindingResult.hasErrors()}">
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-4 rounded-lg mb-4">
            <p class="font-semibold mb-3">Ada kesalahan dalam form:</p>
            <ul class="list-disc list-inside space-y-1 text-sm">
                <li th:each="error : ${bindingResult.allErrors}" th:text="${error.defaultMessage}">
                    Kesalahan validasi
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
