<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <aside th:fragment="sidebar" class="bg-white border-r border-stone-200 w-64 min-h-screen flex flex-col py-6 px-4">
        <!-- User Profile -->
        <div class="mb-8 pb-6 border-b border-stone-200">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                    <span class="text-orange-500 font-bold">DR</span>
                </div>
                <div>
                    <p class="font-semibold text-stone-900 text-sm" th:text="${doctor?.fullName} ?: 'Dr. Ahmad'"></p>
                    <p class="text-stone-500 text-xs" th:text="${doctor?.specialization} ?: 'Umum'"></p>
                </div>
            </div>
        </div>

        <!-- Availability Status -->
        <div class="mb-8 pb-6 border-b border-stone-200">
            <label class="flex items-center justify-between cursor-pointer">
                <span class="font-medium text-stone-900">Status Saya</span>
                <div class="relative">
                    <input type="checkbox" id="availability-toggle" class="sr-only peer" th:checked="${doctor?.isAvailable} ?: true">
                    <div class="w-11 h-6 bg-stone-300 peer-checked:bg-green-500 rounded-full transition"></div>
                    <div class="absolute left-0 top-0 w-5 h-5 bg-white rounded-full transition peer-checked:translate-x-5 peer-checked:left-0.5"></div>
                </div>
            </label>
            <p class="text-xs text-stone-500 mt-2" id="status-text">
                <span th:if="${doctor?.isAvailable}" class="text-green-600">Tersedia sekarang</span>
                <span th:unless="${doctor?.isAvailable}" class="text-red-600">Tidak tersedia</span>
            </p>
        </div>

        <!-- Menu Items -->
        <nav class="flex-1">
            <ul class="space-y-2">
                <li>
                    <a th:href="@{/doctor/dashboard}" 
                       class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
                       th:classappend="${#httpServletRequest.requestURI == '/doctor/dashboard'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''">
                        Dashboard
                    </a>
                </li>
                <li>
                    <a th:href="@{/doctor/queue}" 
                       class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
                       th:classappend="${#httpServletRequest.requestURI.contains('/queue')} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''">
                        Antrian Konsultasi
                    </a>
                </li>
                <li>
                    <a th:href="@{/doctor/consultations}" 
                       class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
                       th:classappend="${#httpServletRequest.requestURI.contains('/consultations')} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''">
                        Riwayat Konsultasi
                    </a>
                </li>
                <li>
                    <a th:href="@{/doctor/profile}" 
                       class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
                       th:classappend="${#httpServletRequest.requestURI.contains('/profile')} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''">
                        Profil
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Logout Button -->
        <div class="pt-6 border-t border-stone-200">
            <form th:action="@{/logout}" method="post" class="w-full">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="w-full px-4 py-3 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition font-medium text-left">
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <script>
        document.getElementById('availability-toggle').addEventListener('change', function() {
            const statusText = document.getElementById('status-text');
            if (this.checked) {
                statusText.innerHTML = '<span class="text-green-600">Tersedia sekarang</span>';
            } else {
                statusText.innerHTML = '<span class="text-red-600">Tidak tersedia</span>';
            }
        });
    </script>
</body>
</html>
