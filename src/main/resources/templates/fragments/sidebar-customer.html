<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <aside
      th:fragment="sidebar"
      class="bg-white border-r border-stone-200 w-64 min-h-screen flex flex-col py-6 px-4"
    >
      <!-- User Profile -->
      <div class="mb-8 pb-6 border-b border-stone-200">
        <div class="flex items-center gap-4 mb-4">
          <div
            class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center"
          >
            <span
              class="text-orange-500 font-bold"
              th:text="${customer.name != null ? customer.name.substring(0,1) : 'C'}"
              >C</span
            >
          </div>
          <div>
            <p
              class="font-semibold text-stone-900 text-sm"
              th:text="${customer.name} ?: 'Customer'"
            ></p>
            <p class="text-stone-500 text-xs">Pasien</p>
          </div>
        </div>
      </div>

      <!-- Menu Items -->
      <nav class="flex-1">
        <ul class="space-y-2">
          <li>
            <a
              th:href="@{/customer/dashboard}"
              class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'dashboard'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              Dashboard
            </a>
          </li>
          <li>
            <a
              th:href="@{/customer/medicines}"
              class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'medicines'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              Katalog Obat
            </a>
          </li>
          <li>
            <a
              th:href="@{/customer/cart}"
              class="flex items-center justify-between px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'cart'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              <span>Keranjang</span>
              <span
                class="bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                th:text="${cartCount} ?: '0'"
              ></span>
            </a>
          </li>
          <li>
            <a
              th:href="@{/customer/consultations}"
              class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'consultations'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              Konsultasi
            </a>
          </li>
          <li>
            <a
              th:href="@{/customer/orders}"
              class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'orders'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              Riwayat Pesanan
            </a>
          </li>
          <li>
            <a
              th:href="@{/customer/profile}"
              class="block px-4 py-3 rounded-lg text-stone-700 hover:bg-orange-50 hover:text-orange-600 transition font-medium"
              th:classappend="${activeSection == 'profile'} ? 'bg-orange-100 text-orange-600 border-l-4 border-orange-500' : ''"
            >
              Profil
            </a>
          </li>
        </ul>
      </nav>

      <!-- Logout Button -->
      <div class="pt-6 border-t border-stone-200">
        <form th:action="@{/auth/logout}" method="post" class="w-full">
          <input
            th:if="${_csrf != null}"
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />
          <button
            type="submit"
            class="w-full px-4 py-3 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition font-medium text-left"
          >
            Logout
          </button>
        </form>
      </div>
    </aside>
  </body>
</html>
