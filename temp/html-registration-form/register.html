<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar — KlinikKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>* { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#FDF3F0] min-h-screen flex items-center justify-center px-4 py-10">

  <!-- Card Container -->
  <div class="bg-white max-w-lg w-full shadow-xl rounded-2xl p-8">

    <!-- Header -->
    <div class="flex flex-col items-center mb-6">
      <!-- Medical Icon -->
      <div class="bg-[#FAD5C8] w-12 h-12 rounded-full flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-[#D53E0F]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
          <circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-stone-900 text-center">Daftar sebagai Pasien</h1>
      <p class="text-sm text-stone-500 text-center mt-1">Bergabung dan nikmati konsultasi dokter serta beli obat dengan mudah</p>
    </div>

    <!-- Alert Error Global -->
    <!-- Thymeleaf: Tampilkan pesan error global jika ada -->
    <div th:if="${error}"
         class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center gap-2 mb-4">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span th:text="${error}">Terjadi kesalahan, periksa kembali data Anda.</span>
    </div>

    <!-- Registration Form -->
    <!-- Thymeleaf: Form action dan object binding -->
    <form th:action="@{/auth/register/customer}" th:object="${customerRegisterForm}" method="post" class="space-y-4">
      
      <!-- CSRF Token -->
      <!-- Thymeleaf: CSRF protection token -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Field 1: Nama Lengkap -->
      <div>
        <label for="name" class="block font-medium text-sm text-stone-700 mb-1">Nama Lengkap</label>
        <!-- Thymeleaf: Binding field name -->
        <input type="text" 
               id="name"
               th:field="*{name}" 
               th:classappend="${#fields.hasErrors('name')} ? 'border-red-400' : ''"
               placeholder="Masukkan nama lengkap Anda"
               class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition"/>
        <!-- Thymeleaf: Error message untuk field name -->
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs mt-1">Error message</p>
      </div>

      <!-- Field 2: Email -->
      <div>
        <label for="email" class="block font-medium text-sm text-stone-700 mb-1">Email</label>
        <!-- Thymeleaf: Binding field email -->
        <input type="email" 
               id="email"
               th:field="*{email}" 
               th:classappend="${#fields.hasErrors('email')} ? 'border-red-400' : ''"
               placeholder="contoh@email.com"
               class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition"/>
        <!-- Thymeleaf: Error message untuk field email -->
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1">Error message</p>
      </div>

      <!-- Field 3: Password -->
      <div>
        <label for="password" class="block font-medium text-sm text-stone-700 mb-1">Password</label>
        <div class="relative">
          <!-- Thymeleaf: Binding field password -->
          <input type="password" 
                 id="password"
                 th:field="*{password}" 
                 th:classappend="${#fields.hasErrors('password')} ? 'border-red-400' : ''"
                 placeholder="Minimal 8 karakter"
                 class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition pr-12"/>
          <!-- Toggle Password Visibility Button -->
          <button type="button" 
                  id="togglePassword"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition">
            <!-- Eye Icon (visible when password is hidden) -->
            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <!-- Eye-Off Icon (visible when password is shown) -->
            <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
        <!-- Thymeleaf: Error message untuk field password -->
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs mt-1">Error message</p>
      </div>

      <!-- Field 4: Nomor HP -->
      <div>
        <label for="phoneNumber" class="block font-medium text-sm text-stone-700 mb-1">Nomor HP</label>
        <!-- Thymeleaf: Binding field phoneNumber -->
        <input type="tel" 
               id="phoneNumber"
               th:field="*{phoneNumber}" 
               th:classappend="${#fields.hasErrors('phoneNumber')} ? 'border-red-400' : ''"
               placeholder="Contoh: 08123456789"
               class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition"/>
        <!-- Thymeleaf: Error message untuk field phoneNumber -->
        <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-red-500 text-xs mt-1">Error message</p>
      </div>

      <!-- Field 5: Alamat -->
      <div>
        <label for="address" class="block font-medium text-sm text-stone-700 mb-1">Alamat Lengkap</label>
        <!-- Thymeleaf: Binding field address -->
        <textarea id="address"
                  rows="3"
                  th:field="*{address}" 
                  th:classappend="${#fields.hasErrors('address')} ? 'border-red-400' : ''"
                  placeholder="Jl. Contoh No. 1, Kelurahan, Kecamatan, Kota"
                  class="border border-stone-200 rounded-xl px-4 py-2.5 w-full text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-[#D53E0F] focus:border-transparent transition resize-none"></textarea>
        <!-- Thymeleaf: Error message untuk field address -->
        <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-red-500 text-xs mt-1">Error message</p>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-[#D53E0F] hover:bg-[#5E0006] text-white font-semibold py-3 rounded-xl transition-colors duration-200 text-sm mt-2 cursor-pointer">
        Daftar Sekarang
      </button>
    </form>

    <!-- Footer -->
    <div class="border-t border-stone-100 mt-6 pt-4 text-center text-sm text-stone-500">
      Sudah punya akun?
      <!-- Thymeleaf: Link ke halaman login -->
      <a th:href="@{/auth/login}" class="font-semibold text-[#D53E0F] hover:text-[#5E0006] ml-1">Masuk di sini</a>
    </div>

  </div>

</body>

<!-- Vanilla JS: Toggle Password Visibility -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    toggleBtn.addEventListener('click', function() {
      // Toggle password visibility
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.add('hidden');
        eyeOffIcon.classList.remove('hidden');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('hidden');
        eyeOffIcon.classList.add('hidden');
      }
    });
  });
</script>
</html>
